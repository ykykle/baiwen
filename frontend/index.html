<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bwen AI Chat Assistant</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js for code syntax highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.0/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.0/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.0/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.0/lib/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.0/lib/languages/json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.0/lib/languages/css.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.0/lib/languages/sql.min.js"></script>
</head>
<body>
    <!-- Layout Container -->
    <div id="app" class="app-container">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button id="btn-new-chat" class="btn btn-new-chat" title="新建对话">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>新对话</span>
                </button>
            </div>
            <div id="conversation-list" class="conversation-list">
                <!-- Conversations rendered here -->
            </div>
            <div class="sidebar-footer">
                <div id="api-status" class="api-status">
                    <span class="status-dot"></span>
                    <span class="status-text">检查连接...</span>
                </div>
                <button id="btn-theme" class="btn btn-icon" title="切换主题">
                    <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </aside>

        <!-- Unified sidebar toggle — always visible, positioned at sidebar edge -->
        <button id="btn-toggle-sidebar" class="btn btn-toggle-sidebar" title="收起侧边栏">
            <svg class="icon-collapse" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                <line x1="9" y1="3" x2="9" y2="21"></line>
                <line x1="15" y1="9" x2="9" y2="12"></line>
                <line x1="15" y1="15" x2="9" y2="12"></line>
            </svg>
            <svg class="icon-expand" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                <line x1="9" y1="3" x2="9" y2="21"></line>
                <line x1="15" y1="9" x2="9" y2="12"></line>
                <line x1="15" y1="15" x2="9" y2="12"></line>
            </svg>
        </button>

        <!-- Sidebar Resize Handle -->
        <div id="sidebar-resizer" class="sidebar-resizer"></div>

        <!-- Main Chat Area -->
        <main id="main" class="main-area">
            <!-- Empty State -->
            <div id="empty-state" class="empty-state">
                <div class="empty-state-content">
                    <div class="logo-icon">
                        <img src="/Bwen.png" alt="Bwen AI" width="64" height="64" style="border-radius: 16px;">
                    </div>
                    <h1>Bwen AI Chat Assistant</h1>
                    <p class="subtitle">基于 DeepSeek 大模型的智能对话助手</p>
                    <div class="quick-actions">
                        <button class="quick-action-btn" data-prompt="请帮我写一段 Python 代码，实现快速排序算法">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                            <span>编写代码</span>
                        </button>
                        <button class="quick-action-btn" data-prompt="请帮我分析这篇文档的核心要点">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                            <span>分析文档</span>
                        </button>
                        <button class="quick-action-btn" data-prompt="请帮我把这段话翻译成英文">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                            <span>翻译文本</span>
                        </button>
                        <button class="quick-action-btn" data-prompt="请帮我头脑风暴，我想做一个AI项目，有什么好想法？">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
                            <span>头脑风暴</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Chat Messages -->
            <div id="chat-messages" class="chat-messages" style="display:none">
                <!-- Messages rendered here -->
            </div>

            <!-- Chat Input Area -->
            <div id="chat-input-area" class="chat-input-area">
                <!-- Attachment Previews -->
                <div id="attachment-previews" class="attachment-previews"></div>

                <!-- Mode & Model Bar -->
                <div class="input-options-bar">
                    <div class="mode-selector">
                        <button class="mode-btn active" data-mode="quick" title="快速响应">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                            快速
                        </button>
                        <button class="mode-btn" data-mode="deep" title="深度思考">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                            深度思考
                        </button>
                    </div>
                    <div class="model-selector">
                        <select id="model-select" class="model-select">
                            <option value="deepseek-v4-flash" selected>DeepSeek V4 Flash</option>
                            <option value="deepseek-v4-pro">DeepSeek V4 Pro</option>
                        </select>
                    </div>
                </div>

                <!-- Input Row -->
                <div class="input-row">
                    <button id="btn-upload" class="btn btn-icon btn-upload" title="上传文件/图片">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 1 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                        </svg>
                    </button>
                    <input type="file" id="file-input" class="file-input-hidden" multiple accept="image/*,.pdf,.txt,.md,.csv,.json,.py,.js,.html,.css">
                    <textarea
                        id="chat-input"
                        class="chat-input"
                        placeholder="输入消息... (Enter 发送, Shift+Enter 换行)"
                        rows="1"
                    ></textarea>
                    <button id="btn-send" class="btn btn-send" title="发送消息">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay" style="display:none">
        <div class="loading-spinner"></div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="context-menu" style="display:none">
        <button data-action="rename">重命名</button>
        <button data-action="delete" class="danger">删除对话</button>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <!-- JS Modules -->
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/chat.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
